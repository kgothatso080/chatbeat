<!DOCTYPE html>
<html>
<head>
  <title>ChatBeat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family: Arial; background: #0b141a; color: white; }
    .topbar { background: linear-gradient(90deg, #00C896, #0077FF); padding: 10px 15px; display: flex; justify-content: space-between; }
    #cover { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:20px; }
    input, button, textarea { padding:12px; margin:8px; border-radius:25px; border:none; width:80%; max-width:300px; font-size:16px; }
    button { background: linear-gradient(90deg, #00C896, #0077FF); color:white; font-weight:700; cursor:pointer; }
    #app { display:none; }
    .card { background: #202c33; padding:10px; margin:10px; border-radius:12px; }
    .bubble { max-width: 75%; padding: 8px; margin:4px; border-radius: 8px; }
    .me-bubble { background: #0077FF; margin-left: auto; }
    .other-bubble { background: #005c4b; margin-right: auto; }
    #global-chat { height: 70vh; overflow-y:auto; padding:10px; }
  </style>
</head>
<body>

<div id="cover">
  <h1>ChatBeat</h1>
  <input id="email-input" placeholder="Email">
  <input id="pass-input" placeholder="Password" type="password">
  <button id="login-btn">Login</button>
  <button id="register-btn">Register</button>
  <p id="cover-error" style="color:#FF6B6B;"></p>
</div>

<div id="app">
  <div class="topbar">
    <h2>ChatBeat</h2>
    <button id="logout-btn">Logout</button>
  </div>
  <div id="feed"></div>
  <div id="global-chat"></div>
  <input id="chat-input" placeholder="Type message">
  <button id="send-chat">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, setPersistence, browserLocalPersistence, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getDatabase, ref, set, get, push, onChildAdded, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD97-el91-ISWGkOhxWy4V_wXyOK6MJl0k",
  authDomain: "chatbeat-71f80.firebaseapp.com",
  databaseURL: "https://chatbeat-71f80-default-rtdb.firebaseio.com",
  projectId: "chatbeat-71f80"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

setPersistence(auth, browserLocalPersistence); // THIS MAKES LOGIN FAST

let currentUser = null;

// 1. REGISTER
document.getElementById('register-btn').onclick = async () => {
 const email = document.getElementById('email-input').value.trim();
 const pass = document.getElementById('pass-input').value.trim();
 document.getElementById('cover-error').innerText = "Registering...";
 try {
   await createUserWithEmailAndPassword(auth, email, pass);
 } catch(e) { document.getElementById('cover-error').innerText = e.message; }
}

// 2. LOGIN
document.getElementById('login-btn').onclick = () => {
 const email = document.getElementById('email-input').value.trim();
 const pass = document.getElementById('pass-input').value.trim();
 document.getElementById('cover-error').innerText = "Logging in...";
 signInWithEmailAndPassword(auth, email, pass).catch(e => { 
   document.getElementById('cover-error').innerText = e.message; 
 });
}

// 3. LOGOUT
document.getElementById('logout-btn').onclick = () => signOut(auth);

// 4. AUTH STATE - THIS IS THE KEY
onAuthStateChanged(auth, (user) => {
 if(user) {
   currentUser = user;
   console.log("LOGGED IN:", user.email);
   document.getElementById('cover').style.display = 'none';
   document.getElementById('app').style.display = 'block';
   document.getElementById('cover-error').innerText = '';
   loadChat();
 } else {
   console.log("LOGGED OUT");
   document.getElementById('cover').style.display = 'flex';
   document.getElementById('app').style.display = 'none';
 }
});

// 5. SIMPLE CHAT
document.getElementById('send-chat').onclick = async () => {
  const text = document.getElementById('chat-input').value.trim();
  if(!text) return;
  document.getElementById('chat-input').value = '';
  await push(ref(db, 'globalChat'), { uid: currentUser.uid, text, timestamp: Date.now() });
}

function loadChat() {
  document.getElementById('global-chat').innerHTML = '';
  onChildAdded(query(ref(db, 'globalChat'), orderByChild('timestamp'), limitToLast(50)), (snap) => {
    const msg = snap.val();
    const div = document.createElement('div');
    div.className = msg.uid === currentUser.uid ? 'bubble me-bubble' : 'bubble other-bubble';
    div.innerText = msg.text;
    document.getElementById('global-chat').appendChild(div);
  });
}
</script>
</body>
</html>
