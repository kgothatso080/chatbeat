<!DOCTYPE html>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

import { getDatabase, ref, set, get, query, orderByChild, equalTo, push, onChildAdded, remove, off, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD97-el91-ISWGkOhxWy4V_wXyOK6MJl0k",
  authDomain: "chatbeat-71f80.firebaseapp.com",
  databaseURL: "https://chatbeat-71f80-default-rtdb.firebaseio.com",
  projectId: "chatbeat-71f80",
  storageBucket: "chatbeat-71f80.appspot.com",
  messagingSenderId: "38692820606",
  appId: "1:38692820606:web:edce5abf8d103e1f6e6a2f",
  measurementId: "G-KZ5KN31YFL"
};
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getDatabase(app);

const colors = ['#00C896', '#0077FF', '#00FFD1', '#FF6B6B', '#F7DC6F', '#9B59B6', '#E67E22', '#1ABC9C'];
const DEFAULT_PIC = 'https://ui-avatars.com/api/?name=U&background=00C896&color=fff';
let currentUser = null;
let mediaRecorder;
let audioChunks = [];
let isRecording = false;
let loadedMessages = new Set();
let postImageData = null;
let chatImageData = null;
let userCache = {};
let allMessagesCache = {};
let replyToMsg = null;
let dragging = null;
let shareLink = '';
const DRAG_THRESHOLD = 70;
const REACTIONS = ['❤️','😂','😮','😢','😡','👎'];
const LONG_PRESS = 500;

window.openProfilePopup = (imgSrc) => {
  if(!imgSrc) return;
  document.getElementById('profile-popup-img').src = imgSrc;
  document.getElementById('profile-popup').classList.add('show');
}
window.closeProfilePopup = () => {
  document.getElementById('profile-popup').classList.remove('show');
}
document.getElementById('profile-popup').onclick = closeProfilePopup;

function setReply(msgData, msgKey){
  replyToMsg = {...msgData, key: msgKey };
  document.getElementById('reply-label').innerText = `Replying to ${msgData.name || 'User'}`;
  document.getElementById('reply-msg').innerText = msgData.text || 'Media';
  document.getElementById('reply-bar').classList.add('show');
}
function cancelReply(){
  replyToMsg = null;
  document.getElementById('reply-bar').classList.remove('show');
}
document.getElementById('cancel-reply').onclick = cancelReply;

async function setReaction(path, emoji){
  const userReactRef = ref(db, path + '/' + currentUser.uid);
  const snap = await get(userReactRef);
  if(snap.exists() && snap.val() === emoji){ await remove(userReactRef); } // TOGGLE OFF
  else { await set(userReactRef, emoji); } // TOGGLE ON
}

async function renderReactions(container, reactions, userReact){
  if(!container) return;
  container.innerHTML = '';
  const counts = {}; const usersByEmoji = {};
  for(const [uid, emoji] of Object.entries(reactions||{})){
    counts[emoji] = (counts[emoji]||0)+1;
    const u = await getUser(uid);
    if(!usersByEmoji[emoji]) usersByEmoji[emoji] = [];
    usersByEmoji[emoji].push(u.name);
  }
  if(Object.keys(counts).length > 0){
    let html = '<div class="react-bubble">';
    Object.keys(counts).slice(0,3).forEach(e=> html += e);
    html += `<span style="font-size:11px; margin-left:4px">${Object.values(counts).reduce((a,b)=>a+b,0)}</span></div>`;
    let tooltip = '<div class="react-names-tooltip">';
    for(const [emoji, names] of Object.entries(usersByEmoji)){
      tooltip += `<div>${emoji} <b>${names.length}</b> - ${names.join(', ')}</div>`;
    }
    tooltip += '</div>';
    html += tooltip;
    container.innerHTML = html;
    container.onclick = (e) => {
      e.stopPropagation();
      document.querySelectorAll('.react-names-tooltip').forEach(t => t.style.display = 'none');
      const tip = container.querySelector('.react-names-tooltip');
      tip.style.display = 'block';
      setTimeout(()=>{ if(tip) tip.style.display = 'none' }, 3000);
    }
  }
}

function startAutoDelete() {
  setInterval(() => {
    const now = Date.now();
    const sevenDaysAgo = now - (7 * 24 * 60 * 60 * 1000);
    const tenDaysAgo = now - (10 * 24 * 60 * 60 * 1000);
    get(ref(db, 'globalChat')).then(snapshot => {
      snapshot.forEach(msg => {
        if(msg.val().timestamp < sevenDaysAgo){
          remove(ref(db, 'globalChat/' + msg.key));
        }
      })
    });
    get(ref(db, 'posts')).then(snapshot => {
      snapshot.forEach(post => {
        if(post.val().timestamp < tenDaysAgo){
          remove(ref(db, 'posts/' + post.key));
        }
      })
    });
  }, 60 * 60 * 1000);
}

// VIDEO UPLOAD WITH AUTO COMPRESSION + 10MB ALERT
document.getElementById('video-upload').onchange = async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  alert("Checking video size...");

  // Step 1: If already under 9MB, just upload
  if(file.size <= 9000000){
    uploadVideo(file);
    return;
  }

  // Step 2: If over 10MB, alert and try compress
  if(file.size > 10000000){
    alert(`Video is ${(file.size/1024/1024).toFixed(1)}MB. Max is 10MB. I will try to compress it now...`);
  } else {
    alert(`Video is ${(file.size/1024/1024).toFixed(1)}MB. Compressing to fit...`);
  }

  // Step 3: Compress using canvas
  const compressedBlob = await compressVideo(file);

  if(!compressedBlob){
    alert("Compression failed. Please record a shorter video or use 480p");
    return;
  }

  if(compressedBlob.size > 10000000){
    alert(`Still too big: ${(compressedBlob.size/1024/1024).toFixed(1)}MB. Please make it under 10 seconds.`);
    return;
  }

  uploadVideo(compressedBlob);
}

// Helper: upload function
async function uploadVideo(fileBlob){
  alert("Uploading video...");
  const reader = new FileReader();
  reader.onload = async ()=>{
    const desc = prompt("Add a description:");
    await push(ref(db, 'videos'), {
      uid: currentUser.uid,
      video: reader.result, // base64
      desc,
      timestamp: Date.now(),
      reactions:{},
      comments:{}
    });
    alert("Video posted!")
  }
  reader.readAsDataURL(fileBlob);
}

// Helper: compress video WITH CLEAN VOICE
function compressVideo(file){
  return new Promise((resolve)=>{
    const video = document.createElement('video');
    video.src = URL.createObjectURL(file);
    video.muted = false;
    video.playsInline = true;
    video.preload = 'auto';

    video.onloadedmetadata = async () => {
      // Get original stream with video + audio
      const stream = video.captureStream(); 

      // BETTER SETTINGS = LESS SCRATCHING
      const recorder = new MediaRecorder(stream, {
        mimeType: 'video/webm;codecs=vp8,opus', 
        videoBitsPerSecond: 600000, // 600kbps instead of 400kbps - smoother video
        audioBitsPerSecond: 96000   // 96kbps instead of 48kbps - CLEAN VOICE
      });

      const chunks = [];
      recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
      recorder.onstop = () => {
        const blob = new Blob(chunks, {type: 'video/webm'});
        URL.revokeObjectURL(video.src);
        resolve(blob);
      };

      video.currentTime = 0;
      await video.play();
      recorder.start(250); // collect every 250ms = smoother

      // Stop after video ends or 10s max
      const maxTime = Math.min(video.duration * 1000, 10000);
      setTimeout(() => {
        if(recorder.state === 'recording') recorder.stop();
        video.pause();
      }, maxTime);
    };
    video.onerror = () => resolve(null);
  });
}

  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = async ()=>{
      chatImageData = reader.result;
      await push(ref(db, 'globalChat'), { uid: currentUser.uid, image: chatImageData, replyTo: replyToMsg?.key || null, timestamp: Date.now(), reactions:{} });
      chatImageData = null;
      cancelReply();
    }
    reader.readAsDataURL(file);
  }
}

document.getElementById('send-chat').onclick = async () => {
  const text = document.getElementById('chat-input').value.trim();
  if(!text) return;
  document.getElementById('chat-input').value = '';
  await push(ref(db, 'globalChat'), { uid: currentUser.uid, text, replyTo: replyToMsg?.key || null, timestamp: Date.now(), reactions:{} });
  cancelReply();
}

const recordBtn = document.getElementById('record-btn');
recordBtn.onclick = async () => {
  if(!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, {type: 'audio/webm'});
        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
          await push(ref(db, 'globalChat'), { uid: currentUser.uid, audio: reader.result, replyTo: replyToMsg?.key || null, timestamp: Date.now(), reactions:{} });
          cancelReply();
        }
      }
      mediaRecorder.start();
      recordBtn.innerText = "⏹️";
      recordBtn.classList.add('record-btn');
      isRecording = true;
    } catch(e) {
      alert("Mic blocked. Allow microphone permission.");
    }
  } else {
    mediaRecorder.stop();
    recordBtn.innerText = "🎤";
    recordBtn.classList.remove('record-btn');
    isRecording = false;
  }
}

function getX(e){ return e.touches? e.touches[0].clientX : e.clientX; }
function startDrag(e, msgKey){
  dragging = { id: msgKey, startX: getX(e), x: 0 };
}
function moveDrag(e){
  if(!dragging) return;
  dragging.x = getX(e) - dragging.startX;
  if(dragging.x < 0) dragging.x = 0;
  const el = document.getElementById('wrapper-' + dragging.id);
  if(el) el.style.transform = `translateX(${dragging.x}px)`;
  const hint = el?.querySelector('.reply-hint');
  if(hint) hint.style.opacity = dragging.x > 30? 1 : 0;
  if(dragging.x > 20) e.preventDefault();
}
function endDrag(e, msgData, msgKey){
  if(!dragging) return;
  if(dragging.x > DRAG_THRESHOLD){ setReply(msgData, msgKey); }
  const el = document.getElementById('wrapper-' + dragging.id);
  if(el) el.style.transform = 'translateX(0)';
  dragging = null;
}

function loadChat() {
  off(ref(db, 'globalChat'));
  document.getElementById('global-chat').innerHTML = '<p style="text-align:center; opacity:0.6">Loading messages...</p>';
  loadedMessages.clear();
  get(query(ref(db, 'globalChat'), orderByChild('timestamp'), limitToLast(50))).then(async (snapshot) => {
    document.getElementById('global-chat').innerHTML = '';
    const promises = [];
    snapshot.forEach((snap) => { promises.push(renderMessage(snap, false)); })
    await Promise.all(promises);
    document.getElementById('global-chat').scrollTop = document.getElementById('global-chat').scrollHeight;

    onChildAdded(query(ref(db, 'globalChat'), orderByChild('timestamp'), limitToLast(1)), (snap) => {
      if(!loadedMessages.has(snap.key)){ renderMessage(snap, true); }
    });
  });
}

async function renderMessage(snap, scroll){
  const msg = snap.val();
  const msgKey = snap.key;
  if(loadedMessages.has(msgKey)) return;
  loadedMessages.add(msgKey);
  allMessagesCache[msgKey] = msg;

  const user = await getUser(msg.uid);
  const userPic = user.profilePic || DEFAULT_PIC;
  const isMe = msg.uid === currentUser.uid;
  const userReact = msg.reactions?.[currentUser.uid] || null;
  msg.name = user.name;

  const wrapper = document.createElement('div');
  wrapper.className = `bubble-wrapper ${isMe? 'me-wrapper' : 'other-wrapper'}`;
  wrapper.id = 'wrapper-' + msgKey;

  let delBtn = isMe? `<button class="bubble-del" onclick="deleteMsg('${msgKey}')">×</button>` : '';

  let replyHtml = '';
  if(msg.replyTo && allMessagesCache[msg.replyTo]){
    const repliedMsg = allMessagesCache[msg.replyTo];
    const repliedUser = await getUser(repliedMsg.uid);
    replyHtml = `<div class="reply-quote">
      <div class="reply-quote-name">${repliedUser.name}</div>
      <div class="reply-quote-text">${repliedMsg.text || 'Media'}</div>
    </div>`;
  }

  let content = '';
  if(msg.image) {
    content = `${replyHtml}<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<img class="bubble-img" src="${msg.image}" onclick="openProfilePopup('${msg.image}')">`;
  } else if(msg.audio) {
    content = `${replyHtml}<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<audio controls src="${msg.audio}"></audio>`;
  } else {
    content = `${replyHtml}<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<span class="bubble-text">${msg.text}</span>`;
  }

  wrapper.innerHTML = `<div class="reply-hint">↩️</div><div class="bubble ${isMe? 'me-bubble' : 'other-bubble'}" id="bubble-${msgKey}">${content}<div class="bubble-reactions" id="msg-react-${msgKey}"></div></div><div class="react-picker" id="msg-picker-${msgKey}">${REACTIONS.map(r=>`<span onclick="reactToMsg('${msgKey}','${r}')">${r}</span>`).join('')}</div>`;

  wrapper.addEventListener('touchstart', e => startDrag(e, msgKey), {passive: true});
  wrapper.addEventListener('touchmove', e => moveDrag(e), {passive: false});
  wrapper.addEventListener('touchend', e => endDrag(e, msg, msgKey));
  wrapper.addEventListener('mousedown', e => startDrag(e, msgKey));
  wrapper.addEventListener('mousemove', e => moveDrag(e));
  wrapper.addEventListener('mouseup', e => endDrag(e, msg, msgKey));
  wrapper.addEventListener('mouseleave', e => endDrag(e, msg, msgKey));

  const reactSum = wrapper.querySelector(`#msg-react-${msgKey}`);
  const picker = wrapper.querySelector(`#msg-picker-${msgKey}`);
  let timer;
  let longPressTriggered = false;

  reactSum.onmousedown = reactSum.ontouchstart = (e) => {
    e.stopPropagation();
    longPressTriggered = false;
    timer = setTimeout(()=>{ picker.classList.add('show'); longPressTriggered = true; }, LONG_PRESS);
  }
  reactSum.onmouseup = reactSum.ontouchend = reactSum.onmouseleave = () => {
    clearTimeout(timer);
    if(!longPressTriggered){ setReaction(`globalChat/${msgKey}/reactions`, '👍') }
  }

  document.getElementById('global-chat').appendChild(wrapper);
  renderReactions(document.getElementById(`msg-react-${msgKey}`), msg.reactions, userReact);
  onValue(ref(db, `globalChat/${msgKey}/reactions`), (s)=>{
    const reacts = s.val() || {};
    renderReactions(document.getElementById(`msg-react-${msgKey}`), reacts, reacts[currentUser.uid]);
  });
  if(scroll) document.getElementById('global-chat').scrollTop = document.getElementById('global-chat').scrollHeight;
}

window.deleteMsg = async (key) => {
  if(confirm("Delete this message?")) {
    await remove(ref(db, 'globalChat/' + key));
    const el = document.getElementById('wrapper-' + key);
    if(el) el.remove();
    loadedMessages.delete(key);
    delete allMessagesCache[key];
  }
}
window.reactToMsg = async (key, emoji) => { await setReaction(`globalChat/${key}/reactions`, emoji); document.getElementById(`msg-picker-${key}`).classList.remove('show'); }

document.getElementById('chat-icon-btn').onclick = () => {
  document.getElementById('feed-section').style.display = 'none';
  document.getElementById('chat-section').style.display = 'block';
  document.getElementById('profile-box').style.display = 'none';
  document.getElementById('videos-section').style.display = 'none';
  document.getElementById('dm-section').style.display = 'none';
  document.getElementById('friends-section').style.display = 'none';
}
document.getElementById('back-to-feed').onclick = backToFeed;
document.getElementById('logo-btn').onclick = backToFeed;

document.addEventListener('click', () => {
  document.querySelectorAll('.react-picker').forEach(p => p.classList.remove('show'));
  document.querySelectorAll('.react-names-tooltip').forEach(t => t.style.display = 'none');
});
</script>
