<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatBeat - Connect in Color</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- COVER PAGE -->
<div id="cover">
  <div class="cover-card">
    <h1>ChatBeat</h1>
    <p>Connect in Color</p>
    <input id="name-input" placeholder="Enter your UNIQUE Name">
    <input id="email-input" type="email" placeholder="Email">
    <input id="pass-input" type="password" placeholder="Password">
    <button id="register-btn">Register</button>
    <button id="login-btn">Login</button>
    <div id="cover-error" class="error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">
  <header>
    <h2>ChatBeat</h2>
    <button id="logout-btn">Logout</button>
  </header>

  <div id="feed"></div>

  <div class="post-box">
    <textarea id="post-text" placeholder="What's on your mind?"></textarea>
    <button id="post-btn">Post</button>
  </div>

  <div id="global-chat"></div>
  <div class="chat-input">
    <input id="chat-input" placeholder="Type a message...">
    <button id="send-chat">Send</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
