function compressVideo(file) {
  return new Promise((resolve) => {
    const video = document.createElement('video');
    video.src = URL.createObjectURL(file);
    video.muted = true;
    video.playsInline = true;
    video.onloadeddata = () => {
      video.play();
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const targetWidth = 320; 
      const targetHeight = (video.videoHeight / video.videoWidth) * targetWidth;
      canvas.width = targetWidth;
      canvas.height = targetHeight;
      const stream = canvas.captureStream(12);
      const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
      const chunks = [];
      recorder.ondataavailable = e => chunks.push(e.data);
      recorder.onstop = () => {
        const compressedBlob = new Blob(chunks, { type: 'video/webm' });
        const reader = new FileReader();
        reader.readAsDataURL(compressedBlob);
        reader.onloadend = () => resolve(reader.result);
      };
      recorder.start();
      function drawFrame() {
        if (video.paused || video.ended) { recorder.stop(); return; }
        ctx.drawImage(video, 0, 0, targetWidth, targetHeight);
        requestAnimationFrame(drawFrame);
      }
      setTimeout(() => { if(recorder.state === "recording") recorder.stop(); }, 15000);
      drawFrame();
    };
  });
}

function initiateReply(msgId, name, text) {
  activeReplyTo = msgId;
  document.getElementById('reply-target-user').innerText = name;
  document.getElementById('reply-target-text').innerText = text;
  document.getElementById('reply-bar').style.display = 'flex';
  document.getElementById('chat-input').focus();
}

function clearReply() {
  activeReplyTo = null;
  document.getElementById('reply-bar').style.display = 'none';
}
document.getElementById('cancel-reply-btn').onclick = clearReply;
  
window.openProfilePopup = (imgSrc) => {
  if(!imgSrc) return;
  document.getElementById('profile-popup-img').src = imgSrc;
  document.getElementById('profile-popup').classList.add('show');
}
window.closeProfilePopup = () => {
  document.getElementById('profile-popup').classList.remove('show');
}

function startAutoDelete() {
  setInterval(() => {
    const now = Date.now();
    const sevenDaysAgo = now - (7 * 24 * 60 * 60 * 1000);
    const tenDaysAgo = now - (10 * 24 * 60 * 60 * 1000);
    get(ref(db, 'globalChat')).then(snapshot => {
      snapshot.forEach(msg => {
        if(msg.val().timestamp < sevenDaysAgo){
          remove(ref(db, 'globalChat/' + msg.key));
        }
      })
    });
    get(ref(db, 'posts')).then(snapshot => {
      snapshot.forEach(post => {
        if(post.val().timestamp < tenDaysAgo){
          remove(ref(db, 'posts/' + post.key));
        }
      })
    });
  }, 60 * 60 * 1000);
}

document.getElementById('register-btn').onclick = async () => {
 const name = document.getElementById('name-input').value.trim();
 const email = document.getElementById('email-input').value.trim();
 const pass = document.getElementById('pass-input').value.trim();
 const err = document.getElementById('cover-error');
 err.innerText = '';
 if(name.length < 3) { err.innerText = "Name must be 3+ letters"; return; }
 try {
   const cred = await createUserWithEmailAndPassword(auth, email, pass);
   const nameSnap = await get(query(ref(db, 'users'), orderByChild('name'), equalTo(name)));
   if(nameSnap.exists()) { await deleteUser(cred.user); err.innerText = "Name already taken!"; return; }
   await set(ref(db, 'users/' + cred.user.uid), { name, email, color: colors[Math.floor(Math.random()*colors.length)], profilePic: DEFAULT_PIC });
 } catch(e) { err.innerText = e.message; }
}

document.getElementById('login-btn').onclick = () => {
 const email = document.getElementById('email-input').value.trim();
 const pass = document.getElementById('pass-input').value.trim();
 signInWithEmailAndPassword(auth, email, pass).catch(e => { document.getElementById('cover-error').innerText = e.message; });
}

document.getElementById('forgot-btn').onclick = () => {
  const email = document.getElementById('email-input').value.trim();
  const err = document.getElementById('cover-error');
  err.innerText = '';
  if(!email) { err.innerText = "Type your email first"; return; }
  sendPasswordResetEmail(auth, email)
.then(() => { alert("Password reset email sent! Check inbox and spam folder"); })
.catch((error) => { err.innerText = error.message; });
}

document.getElementById('logout-btn').onclick = () => {
  userCache = {}; // CLEAR CACHE ON LOGOUT
  signOut(auth)
}

onAuthStateChanged(auth, async (user) => {
 if(user) {
   currentUser = user;
   const userRef = ref(db, 'users/' + user.uid);
   const userSnap = await get(userRef);
   let userData = userSnap.val();
   if(!userSnap.exists()){
     const nameFromEmail = user.email.split('@')[0];
     userData = { name: nameFromEmail, email: user.email, color: colors[Math.floor(Math.random()*colors.length)], profilePic:DEFAULT_PIC };
     await set(userRef, userData);
     alert("Welcome to ChatBeat! Your name is: " + nameFromEmail)
   }
   document.getElementById('cover').style.display = 'none';
   document.getElementById('app').style.display = 'block';
   document.getElementById('my-name').innerText = userData.name;
   document.getElementById('profile-pic').src = userData.profilePic || DEFAULT_PIC;
   loadedMessages.clear();
   document.getElementById('feed').innerHTML = '';
   document.getElementById('global-chat').innerHTML = '';
   startAutoDelete();
   loadPosts();
   loadChat();
 } else {
   document.getElementById('cover').style.display = 'flex';
   document.getElementById('app').style.display = 'none';
 }
});

    }

  document.getElementById('feed-section').style.display = 'none';
  document.getElementById('chat-section').style.display = 'none';
}

document.getElementById('post-img-btn').onclick = () => document.getElementById('post-file').click();
  document.getElementById('post-vid-btn').onclick = () => document.getElementById('post-video-file').click();

document.getElementById('chat-vid-btn').onclick = () => document.getElementById('chat-video-file').click();

  const file = e.target.files[0];
  if(file){
    alert("Reducing/Optimizing message video size... please hold on.");
    const compressed = await compressVideo(file);
    const chatPayload = { uid: currentUser.uid, video: compressed, timestamp: Date.now() };
    if(activeReplyTo) { chatPayload.replyTo = activeReplyTo; clearReply(); }
    await push(ref(db, 'globalChat'), chatPayload);
    document.getElementById('chat-video-file').value = '';

}

document.getElementById('post-file').onchange = (e)=>{
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = ()=>{ postImageData = reader.result; alert("Image ready to post!") }
    reader.readAsDataURL(file);
  }
}

document.getElementById('post-btn').onclick = async () => {
  const text = document.getElementById('post-text').value.trim();
  if(!text && !postImageData && !postVideoData) return;
  await push(ref(db, 'posts'), { uid: currentUser.uid, text, image: postImageData, video: postVideoData, timestamp: Date.now() });
  document.getElementById('post-text').value = '';
  postImageData = null;
  postVideoData = null;
  document.getElementById('post-file').value = '';
  document.getElementById('post-video-file').value = '';

// FAST POSTS WITH CACHE
async function getUser(uid){
  if(userCache[uid]) return userCache[uid]; // RETURN FROM CACHE
  const userSnap = await get(ref(db, 'users/' + uid));
  const user = userSnap.exists()? userSnap.val() : {name: "Deleted User", color: "#888", profilePic:DEFAULT_PIC};
  userCache[uid] = user; // SAVE TO CACHE
  return user;
}
function loadPosts() {
  off(ref(db, 'posts'));
  document.getElementById('feed').innerHTML = '';
  onChildAdded(query(ref(db, 'posts'), orderByChild('timestamp'), limitToLast(50)), async (snap) => {
    const post = snap.val();
    const postKey = snap.key;
    const user = await getUser(post.uid); 
    const userPic = user.profilePic || DEFAULT_PIC;
    const postDiv = document.createElement('div');
    postDiv.className = 'card';
    postDiv.id = 'post-' + postKey;
    let delBtn = '';
    if(post.uid === currentUser.uid) {
      delBtn = `<button class="del-btn" onclick="deletePost('${postKey}')">×</button>`;
    }
    let mediaHtml = '';
    if(post.image) {
      mediaHtml = `<img class="card-post-img" src="${post.image}" onclick="openProfilePopup('${post.image}')">`;
    } else if(post.video) {
      mediaHtml = `<video class="card-post-video" controls src="${post.video}"></video>`;
    }
    postDiv.innerHTML = `${delBtn}<div class="name" style="color:${user.color}"><img class="card-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</div><div>${post.text||''}</div>${mediaHtml}`;
    document.getElementById('feed').prepend(postDiv);
  });
}


window.deletePost = async (key) => {
  if(confirm("Delete this post?")) {
    await remove(ref(db, 'posts/' + key));
    const el = document.getElementById('post-' + key);
    if(el) el.remove();
  }
}

      await push(ref(db, 'globalChat'), { uid: currentUser.uid, image: chatImageData, timestamp: Date.now() });
      chatImageData = null;

document.getElementById('send-chat').onclick = async () => {

  if(activeReplyTo) { chatPayload.replyTo = activeReplyTo; clearReply(); }
  await push(ref(db, 'globalChat'), chatPayload);

const recordBtn = document.getElementById('record-btn');
recordBtn.onclick = async () => {
  if(!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, {type: 'audio/webm'});
        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
          await push(ref(db, 'globalChat'), { uid: currentUser.uid, audio: reader.result, timestamp: Date.now() });
        }
      }
      mediaRecorder.start();
      recordBtn.innerText = "⏹️";
      recordBtn.classList.add('record-btn');
      isRecording = true;
    } catch(e) {
      alert("Mic blocked. Allow microphone permission.");
    }
  } else {
    mediaRecorder.stop();
    recordBtn.innerText = "🎤";
    recordBtn.classList.remove('record-btn');
    isRecording = false;
  }
}

// FAST CHAT - BATCH LOAD FIRST
function loadChat() {
  off(ref(db, 'globalChat'));
  document.getElementById('global-chat').innerHTML = '<p style="text-align:center; opacity:0.6">Loading messages...</p>';
  loadedMessages.clear();

  // STEP 1: LOAD LAST 50 MESSAGES AT ONCE
  get(query(ref(db, 'globalChat'), orderByChild('timestamp'), limitToLast(50))).then(async (snapshot) => {
    document.getElementById('global-chat').innerHTML = '';
    const promises = [];
    snapshot.forEach((snap) => {
      promises.push(renderMessage(snap, false));
    })
    await Promise.all(promises); // LOAD ALL TOGETHER
    document.getElementById('global-chat').scrollTop = document.getElementById('global-chat').scrollHeight;

    // STEP 2: LISTEN FOR NEW MESSAGES ONLY
    onChildAdded(query(ref(db, 'globalChat'), orderByChild('timestamp'), limitToLast(1)), (snap) => {
      if(!loadedMessages.has(snap.key)){
        renderMessage(snap, true);
      }
    });
  });
}

async function renderMessage(snap, scroll){
  const msg = snap.val();
  const msgKey = snap.key;
  if(loadedMessages.has(msgKey)) return;
  loadedMessages.add(msgKey);

  const user = await getUser(msg.uid); 
  const userPic = user.profilePic || DEFAULT_PIC;
  const isMe = msg.uid === currentUser.uid;

  const wrapperDiv = document.createElement('div');
  wrapperDiv.className = 'msg-wrapper';
  wrapperDiv.id = 'msg-' + msgKey;

  wrapperDiv.addEventListener('touchstart', (e) => {
    touchStartX = e.touches.clientX;
    currentSwipeElement = wrapperDiv;
  }, { passive: true });

  wrapperDiv.addEventListener('touchmove', (e) => {
    if (!currentSwipeElement) return;
    let diffX = e.touches.clientX - touchStartX;
    if (diffX > 0 && diffX < 80) { currentSwipeElement.style.transform = `translateX(${diffX}px)`; }
  }, { passive: true });

  wrapperDiv.addEventListener('touchend', (e) => {
    if (!currentSwipeElement) return;
    let diffX = e.changedTouches.clientX - touchStartX;
    currentSwipeElement.style.transform = '';
    if (diffX >= 60) {
      initiateReply(msgKey, user.name, msg.text || (msg.image ? "📷 Image" : msg.video ? "🎥 Video" : "🎵 Voice note"));
    }
    currentSwipeElement = null;
  }, { passive: true });

  let delBtn = '';
  if(isMe) { delBtn = `<button class="bubble-del" onclick="deleteMsg('${msgKey}')">×</button>`; }

  let replyContextHtml = '';
  if(msg.replyTo) {
    const parentMsgSnap = await get(ref(db, 'globalChat/' + msg.replyTo));
    if(parentMsgSnap.exists()){
      const pMsg = parentMsgSnap.val();
      const pUser = await getUser(pMsg.uid);
      const displayContent = pMsg.text || (pMsg.image ? "📷 Image" : pMsg.video ? "🎥 Video" : "🎵 Voice note");
      replyContextHtml = `
        <div class="reply-preview-container">
          <div class="reply-preview-name">${pUser.name}</div>
          <div style="font-size:11px; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${displayContent}</div>
        </div>`;
    }
  }

  let bodyContent = '';
  if(msg.image) {
    bodyContent = `${replyContextHtml}<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<img class="bubble-img" src="${msg.image}" onclick="openProfilePopup('${msg.image}')">`;
  } else if(msg.video) {
    bodyContent = `${replyContextHtml}<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<video class="bubble-video" controls src="${msg.video}"></video>`;
  } else if(msg.audio) {
    bodyContent = `${replyContextHtml}<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<audio controls src="${msg.audio}"></audio>`;
  } else {
    bodyContent = `${replyContextHtml}<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<span class="bubble-text">${msg.text}</span>`;
  }

  if(isMe){
    wrapperDiv.innerHTML = `<div class="bubble me-bubble">${bodyContent}</div>`;
    wrapperDiv.style.justifyContent = 'flex-end';
  } else {
    wrapperDiv.innerHTML = `<div class="bubble other-bubble">${bodyContent}</div>`;
    wrapperDiv.style.justifyContent = 'flex-start';
  }

  document.getElementById('global-chat').appendChild(wrapperDiv);
  if(scroll) document.getElementById('global-chat').scrollTop = document.getElementById('global-chat').scrollHeight;
}


window.deleteMsg = async (key) => {
  if(confirm("Delete this message?")) {
    await remove(ref(db, 'globalChat/' + key));
    const el = document.getElementById('msg-' + key);
    if(el) el.remove();
    loadedMessages.delete(key);
  }
}
