<!DOCTYPE html>
<html>
<head>
  <title>ChatBeat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: 'Roboto', sans-serif; background: #0b141a; color: white; }
.topbar { background: linear-gradient(90deg, #00C896, #0077FF); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.offline-badge { background: #FF6B6B; padding: 4px 10px; border-radius: 20px; font-size: 12px; display:none }
.data-badge { background: #F7DC6F; color:#000; padding: 4px 10px; border-radius: 20px; font-size: 12px; display:none; cursor:pointer }
.topbar h2 { margin: 0; font-size: 20px; text-shadow: 0 0 5px #fff; cursor: pointer; }
.topbar div { display:flex; gap:8px; align-items:center }
.topbar button { background: rgba(0,0,0,0.3); width: auto; padding: 8px 12px; border-radius: 20px; font-weight: 500; border: none; color: white; cursor:pointer }
    #cover { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:20px; background: linear-gradient(135deg, #00C896 0%, #0077FF 50%, #000 100%); }
    #cover h1 { font-size: 3em; text-shadow: 0 0 20px #00C896; }
    input, button, textarea { padding:12px; margin:8px; border-radius:25px; border:none; width:80%; max-width:300px; font-size:16px; font-family: 'Roboto', sans-serif; }
    button { background: linear-gradient(90deg, #00C896, #0077FF); color:white; font-weight:700; cursor:pointer; }
.link-btn { background: transparent!important; text-decoration: underline; font-size: 14px; width: auto; background-image: none!important; }
    textarea { border-radius: 12px; height: 60px; background: #2a3942; color: white; width: 90%; }
    #app { display:none; }
.post-box { padding: 10px; background: #202c33; display:flex; gap:8px; align-items:center }
    #feed { padding: 10px; padding-bottom: 20px; }
.profile-box {background:#202c33; padding:15px; border-radius:12px; margin:10px; text-align:center; display:none}
.profile-box img{width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #00C896}
.card { background: #202c33; padding:10px 12px 10px 12px; margin:10px 0; border-radius:12px; position: relative; max-width: 85%; }
.card.name { font-weight: 700; font-size: 13px; margin-bottom: 4px; display:flex; align-items:center; gap:8px; cursor:pointer }
.card-avatar {width:30px; height:30px; border-radius:50%; object-fit:cover; flex-shrink:0; display:block}
.card-post-img {width:100%; max-width:400px; border-radius:12px; margin-top:8px; cursor:pointer}
.card.del-btn { position: absolute; top: 8px; right: 8px; background: #FF6B6B; padding: 0; width: 20px; height: 20px; border-radius: 50%; font-size: 12px; line-height: 20px; text-align: center; cursor: pointer; border: none; color: white; z-index: 2; }
.chat-header { display: flex; align-items: center; padding: 10px; background: #202c33; border-bottom: 1px solid #2a3942; }
.chat-header h3 { margin: 0 auto; }
    #back-to-feed { background: transparent; width: auto; }
    #global-chat { height: calc(100vh - 250px); overflow-y:auto; background:#0b141a; padding:10px; display: flex; flex-direction: column; gap: 2px; }
.bubble { max-width: 75%; padding: 6px 10px 8px 10px; border-radius: 8px; position: relative; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
.me-bubble { background: #0077FF; border-bottom-right-radius: 2px; margin-left: auto; }
.other-bubble { background: #005c4b; border-bottom-left-radius: 2px; margin-right: auto; }
.bubble-pending { opacity: 0.5; }
.bubble-name { display: flex; align-items:center; gap:6px; font-size: 12px; font-weight: 700; margin-bottom: 3px; cursor:pointer }
.bubble-avatar {width:20px; height:20px; border-radius:50%; object-fit:cover; flex-shrink:0; display:block}
.bubble-text { display: block; }
.bubble-img {max-width:200px; border-radius:8px; margin-top:4px; cursor:pointer}
.bubble-del { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.4); padding: 0; width: 16px; height: 16px; border-radius: 50%; font-size: 10px; line-height: 16px; text-align: center; cursor: pointer; border: none; color: white; z-index: 2; }
.bubble audio { width: 220px; max-width: 100%; margin-top: 4px; }
.chat-input-area { display: flex; padding: 10px; background: #202c33; position: fixed; bottom: 0; left:0; width: 100%; z-index: 5; gap:5px }
.chat-input-area input { flex: 1; border-radius: 25px; background: #2a3942; color: white; }
.chat-input-area button { width: 50px; border-radius: 50%; }
.record-btn { background: red!important; animation: pulse 1s infinite }
.btn-disabled { background: #555!important; cursor: not-allowed!important; opacity: 0.5; }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(255,0,0,0.7)} 70%{box-shadow:0 0 0 10px rgba(255,0,0,0)} 100%{box-shadow:0 0 0 0 rgba(255,0,0,0)} }
.footer { text-align:center; padding:20px; font-size:12px; opacity:0.8; border-top:1px solid #2a3942; background: #111b21; padding-bottom: 80px; }
.footer a { color:#00C896; text-decoration:none; font-weight:700; }

.profile-popup { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index: 9999; }
.profile-popup.show { display:flex!important; }
.profile-popup img { max-width: 90%; max-height: 80%; border-radius: 15px; border: 3px solid #00C896; }
.profile-popup-close { position:absolute; top:20px; right:20px; font-size:40px; color:white; cursor:pointer }
  </style>
</head>
<body>

<div id="cover">
  <h1>ChatBeat</h1>
  <p><b>Connect in Color. Vibe in Sound.</b><br><br>
  Welcome to ChatBeat - the most fun way to connect! 🎉</p>
  <input id="name-input" placeholder="Choose your Name">
  <input id="email-input" placeholder="Email">
  <input id="pass-input" placeholder="Password" type="password">
  <button id="register-btn">Register</button>
  <button id="login-btn">Login</button>
  <button id="forgot-btn" class="link-btn">Forgot Password?</button>
  <p id="cover-error" style="color:#FF6B6B;"></p>
</div>

<div id="app">
  <div class="topbar">
    <button id="logout-btn">Logout</button>
    <h2 id="logo-btn">ChatBeat</h2>
    <div>
      <span id="data-badge" class="data-badge" onclick="toggleDataSaver()">Data Saver ON</span> <!-- NEW -->
      <span id="offline-badge" class="offline-badge">Offline - Queued</span>
      <button id="profile-icon-btn">👤</button>
      <button id="chat-icon-btn">💬</button>
    </div>
  </div>

  <div id="profile-box" class="profile-box">
    <img id="profile-pic" src="https://ui-avatars.com/api/?name=U&background=00C896&color=fff">
    <h3 id="my-name"></h3>
    <button id="data-toggle-btn" style="background:#F7DC6F; color:#000">Turn Data Saver ON</button> <!-- NEW -->
    <input id="profile-upload" type="file" accept="image/*" style="display:none">
    <button onclick="document.getElementById('profile-upload').click()">Change Profile Photo</button>
    <button onclick="document.getElementById('profile-box').style.display='none'">Close</button>
  </div>

  <div id="feed-section">
    <div class="post-box">
      <textarea id="post-text" placeholder="What's on your mind?"></textarea>
      <button id="post-img-btn">📷</button>
      <input id="post-file" type="file" accept="image/*" style="display:none">
      <button id="post-btn">Post</button>
    </div>
    <div id="feed"></div>
  </div>

  <div id="chat-section" style="display:none;">
    <div class="chat-header">
      <button id="back-to-feed">← Back</button>
      <h3>Global Chat</h3>
    </div>
    <div id="global-chat"></div>
    <div class="chat-input-area">
      <button id="chat-img-btn">📷</button>
      <input id="chat-file" type="file" accept="image/*" style="display:none">
      <input id="chat-input" placeholder="Type a message">
      <button id="record-btn">🎤</button>
      <button id="send-chat">➤</button>
    </div>
  </div>

  <div class="footer">
    Website created by <a href="#">Kgothatso Swafo</a> from Limpopo, Burgersfort, Moroke. ✨<br>
    Version 2.0.6 - DATA SAVER MODE
  </div>
</div>

<div id="profile-popup" class="profile-popup">
  <span class="profile-popup-close" onclick="closeProfilePopup()">×</span>
  <img id="profile-popup-img" src="" onclick="event.stopPropagation()">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, deleteUser, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getDatabase, ref, set, get, query, orderByChild, equalTo, push, onChildAdded, remove, off, limitToLast } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD97-el91-ISWGkOhxWy4V_wXyOK6MJl0k",
  authDomain: "chatbeat-71f80.firebaseapp.com",
  databaseURL: "https://chatbeat-71f80-default-rtdb.firebaseio.com",
  projectId: "chatbeat-71f80"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getDatabase(app);

const colors = ['#00C896', '#0077FF', '#00FFD1', '#FF6B6B', '#F7DC6F', '#9B59B6', '#E67E22', '#1ABC9C'];
const DEFAULT_PIC = 'https://ui-avatars.com/api/?name=U&background=00C896&color=fff';
let currentUser = null;
let mediaRecorder;
let audioChunks = [];
let isRecording = false;
let loadedMessages = new Set();
let postImageData = null;
let chatImageData = null;
let userCache = {};
let isOnline = navigator.onLine;
let messageQueue = JSON.parse(localStorage.getItem('chatbeat_queue') || '[]');
let dataSaver = localStorage.getItem('chatbeat_dataSaver') === 'true'; // NEW

// DATA SAVER TOGGLE
function updateDataSaverUI(){
  if(dataSaver){
    document.getElementById('data-badge').style.display='block';
    document.getElementById('data-toggle-btn').innerText = 'Turn Data Saver OFF';
    document.getElementById('chat-img-btn').classList.add('btn-disabled');
    document.getElementById('record-btn').classList.add('btn-disabled');
    document.getElementById('post-img-btn').classList.add('btn-disabled');
  } else {
    document.getElementById('data-badge').style.display='none';
    document.getElementById('data-toggle-btn').innerText = 'Turn Data Saver ON';
    document.getElementById('chat-img-btn').classList.remove('btn-disabled');
    document.getElementById('record-btn').classList.remove('btn-disabled');
    document.getElementById('post-img-btn').classList.remove('btn-disabled');
  }
}
window.toggleDataSaver = () => {
  dataSaver = !dataSaver;
  localStorage.setItem('chatbeat_dataSaver', dataSaver);
  updateDataSaverUI();
  alert(dataSaver ? "Data Saver ON: Only text will work. Good for Meta Free Basics" : "Data Saver OFF: Photos and Voice enabled");
}
document.getElementById('data-toggle-btn').onclick = toggleDataSaver;

function checkDataLimit(action){
  if(dataSaver){
    alert(`Data Saver is ON.\n${action} is disabled.\nTurn it OFF in Profile to use data.`);
    return false;
  }
  return true;
}

window.addEventListener('online', () => { isOnline = true; document.getElementById('offline-badge').style.display='none'; processQueue(); });
window.addEventListener('offline', () => { isOnline = false; document.getElementById('offline-badge').style.display='block'; });

function saveQueue(){ localStorage.setItem('chatbeat_queue', JSON.stringify(messageQueue)); }

async function processQueue(){
  if(messageQueue.length === 0) return;
  while(messageQueue.length > 0){
    const item = messageQueue[0];
    try{
      await push(ref(db, item.path), item.data);
      messageQueue.shift();
      saveQueue();
      document.getElementById(item.data.id)?.classList.remove('bubble-pending');
    }catch(e){ break; }
  }
}

window.openProfilePopup = (imgSrc) => {
  if(!imgSrc) return;
  document.getElementById('profile-popup-img').src = imgSrc;
  document.getElementById('profile-popup').classList.add('show');
}
window.closeProfilePopup = () => {
  document.getElementById('profile-popup').classList.remove('show');
}
document.getElementById('profile-popup').onclick = closeProfilePopup;

function startAutoDelete() {
  setInterval(() => {
    const now = Date.now();
    const sevenDaysAgo = now - (7 * 24 * 60 * 60 * 1000);
    const tenDaysAgo = now - (10 * 24 * 60 * 60 * 1000);
    if(isOnline){
      get(ref(db, 'globalChat')).then(snapshot => {
        snapshot.forEach(msg => {
          if(msg.val().timestamp < sevenDaysAgo){
            remove(ref(db, 'globalChat/' + msg.key));
          }
        })
      });
      get(ref(db, 'posts')).then(snapshot => {
        snapshot.forEach(post => {
          if(post.val().timestamp < tenDaysAgo){
            remove(ref(db, 'posts/' + post.key));
          }
        })
      });
    }
  }, 60 * 60 * 1000);
}

document.getElementById('register-btn').onclick = async () => {
 const name = document.getElementById('name-input').value.trim();
 const email = document.getElementById('email-input').value.trim();
 const pass = document.getElementById('pass-input').value.trim();
 const err = document.getElementById('cover-error');
 err.innerText = '';
 if(name.length < 3) { err.innerText = "Name must be 3+ letters"; return; }
 try {
   const cred = await createUserWithEmailAndPassword(auth, email, pass);
   const nameSnap = await get(query(ref(db, 'users'), orderByChild('name'), equalTo(name)));
   if(nameSnap.exists()) { await deleteUser(cred.user); err.innerText = "Name already taken!"; return; }
   await set(ref(db, 'users/' + cred.user.uid), { name, email, color: colors[Math.floor(Math.random()*colors.length)], profilePic: DEFAULT_PIC });
 } catch(e) { err.innerText = e.message; }
}

document.getElementById('login-btn').onclick = () => {
 const email = document.getElementById('email-input').value.trim();
 const pass = document.getElementById('pass-input').value.trim();
 signInWithEmailAndPassword(auth, email, pass).catch(e => { document.getElementById('cover-error').innerText = e.message; });
}

document.getElementById('forgot-btn').onclick = () => {
  const email = document.getElementById('email-input').value.trim();
  const err = document.getElementById('cover-error');
  err.innerText = '';
  if(!email) { err.innerText = "Type your email first"; return; }
  sendPasswordResetEmail(auth, email)
.then(() => { alert("Password reset email sent! Check inbox and spam folder"); })
.catch((error) => { err.innerText = error.message; });
}

document.getElementById('logout-btn').onclick = () => {
  userCache = {};
  signOut(auth)
}

onAuthStateChanged(auth, async (user) => {
 if(user) {
   currentUser = user;
   const userRef = ref(db, 'users/' + user.uid);
   const userSnap = await get(userRef);
   let userData = userSnap.val();
   if(!userSnap.exists()){
     const nameFromEmail = user.email.split('@')[0];
     userData = { name: nameFromEmail, email: user.email, color: colors[Math.floor(Math.random()*colors.length)], profilePic:DEFAULT_PIC };
     await set(userRef, userData);
   }
   document.getElementById('cover').style.display = 'none';
   document.getElementById('app').style.display = 'block';
   document.getElementById('my-name').innerText = userData.name;
   document.getElementById('profile-pic').src = userData.profilePic || DEFAULT_PIC;
   if(!isOnline) document.getElementById('offline-badge').style.display='block';
   updateDataSaverUI(); // NEW
   loadedMessages.clear();
   document.getElementById('feed').innerHTML = '';
   document.getElementById('global-chat').innerHTML = '';
   startAutoDelete();
   loadPosts();
   loadChat();
   processQueue();
 } else {
   document.getElementById('cover').style.display = 'flex';
   document.getElementById('app').style.display = 'none';
 }
});

document.getElementById('profile-upload').onchange = (e)=>{
  if(!checkDataLimit("Profile photo upload")) return; // BLOCK IF DATA SAVER
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = ()=>{
      if(isOnline){
        set(ref(db,'users/'+currentUser.uid+'/profilePic'), reader.result);
      } else {
        messageQueue.push({path: 'users/'+currentUser.uid+'/profilePic', data: reader.result});
        saveQueue();
        alert("No data. Photo will upload when you're online");
      }
      document.getElementById('profile-pic').src = reader.result;
    }
    reader.readAsDataURL(file);
  }
}

document.getElementById('profile-icon-btn').onclick = () => {
  document.getElementById('profile-box').style.display = 'block';
  document.getElementById('feed-section').style.display = 'none';
  document.getElementById('chat-section').style.display = 'none';
}

document.getElementById('post-img-btn').onclick = () => {
  if(!checkDataLimit("Posting images")) return; // BLOCK IF DATA SAVER
  document.getElementById('post-file').click()
};
document.getElementById('post-file').onchange = (e)=>{
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = ()=>{ postImageData = reader.result; alert("Image ready to post!") }
    reader.readAsDataURL(file);
  }
}

document.getElementById('post-btn').onclick = async () => {
  const text = document.getElementById('post-text').value.trim();
  if(!text &&!postImageData) return;
  if(postImageData && !checkDataLimit("Posting images")) return; // BLOCK IF DATA SAVER
  const data = { uid: currentUser.uid, text, image: postImageData, timestamp: Date.now() };

  if(isOnline){
    await push(ref(db, 'posts'), data);
  } else {
    messageQueue.push({path: 'posts', data});
    saveQueue();
    alert("No data. Post will send when you're online");
  }
  document.getElementById('post-text').value = '';
  postImageData = null;
  document.getElementById('post-file').value = '';
}

async function getUser(uid){
  if(userCache[uid]) return userCache[uid];
  const userSnap = await get(ref(db, 'users/' + uid));
  const user = userSnap.exists()? userSnap.val() : {name: "Deleted User", color: "#888", profilePic:DEFAULT_PIC};
  userCache[uid] = user;
  return user;
}

function loadPosts() {
  off(ref(db, 'posts'));
  document.getElementById('feed').innerHTML = '';
  onChildAdded(query(ref(db, 'posts'), orderByChild('timestamp'), limitToLast(50)), async (snap) => {
    const post = snap.val();
    const postKey = snap.key;
    const user = await getUser(post.uid);
    const userPic = user.profilePic || DEFAULT_PIC;
    const postDiv = document.createElement('div');
    postDiv.className = 'card';
    postDiv.id = 'post-' + postKey;
    let delBtn = '';
    if(post.uid === currentUser.uid) {
      delBtn = `<button class="del-btn" onclick="deletePost('${postKey}')">×</button>`;
    }
    let imgHtml = '';
    if(post.image && !dataSaver) { // HIDE IMAGES IN DATA SAVER
      imgHtml = `<img class="card-post-img" src="${post.image}" onclick="openProfilePopup('${post.image}')">`;
    } else if(post.image && dataSaver){
      imgHtml = `<div style="padding:10px; background:#333; border-radius:8px; margin-top:8px">📷 Image hidden - Turn off Data Saver to view</div>`;
    }
    postDiv.innerHTML = `${delBtn}<div class="name" style="color:${user.color}"><img class="card-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</div><div>${post.text||''}</div>${imgHtml}`;
    document.getElementById('feed').prepend(postDiv);
  });
}

window.deletePost = async (key) => {
  if(confirm("Delete this post?")) {
    await remove(ref(db, 'posts/' + key));
    const el = document.getElementById('post-' + key);
    if(el) el.remove();
  }
}

document.getElementById('chat-img-btn').onclick = () => {
  if(!checkDataLimit("Sending photos")) return; // BLOCK IF DATA SAVER
  document.getElementById('chat-file').click()
};
document.getElementById('chat-file').onchange = async (e)=>{
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = async ()=>{
      const data = { uid: currentUser.uid, image: reader.result, timestamp: Date.now(), id: 'temp_'+Date.now() };
      if(isOnline){
        await push(ref(db, 'globalChat'), data);
      } else {
        messageQueue.push({path: 'globalChat', data});
        saveQueue();
        renderMessage({key: data.id, val: ()=>data}, true, true);
        alert("No data. Photo will send when you're online");
      }
    }
    reader.readAsDataURL(file);
  }
}

document.getElementById('send-chat').onclick = async () => {
  const text = document.getElementById('chat-input').value.trim();
  if(!text) return;
  document.getElementById('chat-input').value = '';
  const data = { uid: currentUser.uid, text, timestamp: Date.now(), id: 'temp_'+Date.now() };

  if(isOnline){
    await push(ref(db, 'globalChat'), data);
  } else {
    messageQueue.push({path: 'globalChat', data});
    saveQueue();
    renderMessage({key: data.id, val: ()=>data}, true, true);
  }
}

const recordBtn = document.getElementById('record-btn');
recordBtn.onclick = async () => {
  if(!checkDataLimit("Sending voice notes")) return; // BLOCK IF DATA SAVER
  if(!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, {type: 'audio/webm'});
        const reader = new FileReader();
        reader.readAsDataURL(audioBlob);
        reader.onloadend = async () => {
          const data = { uid: currentUser.uid, audio: reader.result, timestamp: Date.now(), id: 'temp_'+Date.now() };
          if(isOnline){
            await push(ref(db, 'globalChat'), data);
          } else {
            messageQueue.push({path: 'globalChat', data});
            saveQueue();
            renderMessage({key: data.id, val: ()=>data}, true, true);
            alert("No data. Voice note will send when you're online");
          }
        }
      }
      mediaRecorder.start();
      recordBtn.innerText = "⏹️";
      recordBtn.classList.add('record-btn');
      isRecording = true;
    } catch(e) {
      alert("Mic blocked. Allow microphone permission.");
    }
  } else {
    mediaRecorder.stop();
    recordBtn.innerText = "🎤";
    recordBtn.classList.remove('record-btn');
    isRecording = false;
  }
}

function loadChat() {
  off(ref(db, 'globalChat'));
  document.getElementById('global-chat').innerHTML = '<p style="text-align:center; opacity:0.6">Loading messages...</p>';
  loadedMessages.clear();

  get(query(ref(db, 'globalChat'), orderByChild('timestamp'), limitToLast(50))).then(async (snapshot) => {
    document.getElementById('global-chat').innerHTML = '';
    const promises = [];
    snapshot.forEach((snap) => {
      promises.push(renderMessage(snap, false, false));
    })
    await Promise.all(promises);
    document.getElementById('global-chat').scrollTop = document.getElementById('global-chat').scrollHeight;

    onChildAdded(query(ref(db, 'globalChat'), orderByChild('timestamp'), limitToLast(1)), (snap) => {
      if(!loadedMessages.has(snap.key)){
        renderMessage(snap, true, false);
      }
    });
  });
}

async function renderMessage(snap, scroll, isPending){
  const msg = snap.val();
  const msgKey = snap.key;
  if(loadedMessages.has(msgKey)) return;
  loadedMessages.add(msgKey);

  const user = await getUser(msg.uid);
  const userPic = user.profilePic || DEFAULT_PIC;
  const isMe = msg.uid === currentUser.uid;

  const msgDiv = document.createElement('div');
  msgDiv.id = 'msg-' + msgKey;
  if(isPending) msgDiv.classList.add('bubble-pending');

  let delBtn = '';
  if(isMe) {
    delBtn = `<button class="bubble-del" onclick="deleteMsg('${msgKey}')">×</button>`;
  }

  let content = '';
  if(msg.image && !dataSaver) {
    content = `<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<img class="bubble-img" src="${msg.image}" onclick="openProfilePopup('${msg.image}')">`;
  } else if(msg.image && dataSaver){
    content = `<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<div>📷 Photo - Turn off Data Saver to view</div>`;
  } else if(msg.audio && !dataSaver) {
    content = `<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<audio controls src="${msg.audio}"></audio>`;
  } else if(msg.audio && dataSaver){
    content = `<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<div>🎤 Voice - Turn off Data Saver to listen</div>`;
  } else {
    content = `<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<span class="bubble-text">${msg.text}</span>`;
  }

  if(isMe){
    msgDiv.innerHTML = `<div class="bubble me-bubble">${content}</div>`;
    msgDiv.style.display = 'flex';
    msgDiv.style.justifyContent = 'flex-end';
  } else {
    msgDiv.innerHTML = `<div class="bubble other-bubble">${content}</div>`;
    msgDiv.style.display = 'flex';
    msgDiv.style.justifyContent = 'flex-start';
  }

  document.getElementById('global-chat').appendChild(msgDiv);
  if(scroll) document.getElementById('global-chat').scrollTop = document.getElementById('global-chat').scrollHeight;
}

window.deleteMsg = async (key) => {
  if(confirm("Delete this message?")) {
    await remove(ref(db, 'globalChat/' + key));
    const el = document.getElementById('msg-' + key);
    if(el) el.remove();
    loadedMessages.delete(key);
  }
}

document.getElementById('chat-icon-btn').onclick = () => {
  document.getElementById('feed-section').style.display = 'none';
  document.getElementById('chat-section').style.display = 'block';
  document.getElementById('profile-box').style.display = 'none';
}
document.getElementById('back-to-feed').onclick = () => {
  document.getElementById('feed-section').style.display = 'block';
  document.getElementById('chat-section').style.display = 'none';
  document.getElementById('profile-box').style.display = 'none';
}
document.getElementById('logo-btn').onclick = () => {
  document.getElementById('feed-section').style.display = 'block';
  document.getElementById('chat-section').style.display = 'none';
  document.getElementById('profile-box').style.display = 'none';
}
</script>
