<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Chat</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
  body { height: 100vh; display: flex; flex-direction: column; background: #f0f2f5; }
  header { padding: 12px; background: white; border-bottom: 1px solid #ddd; font-weight: bold; }

  #replyBar {
    display: none;
    padding: 8px 12px;
    background: #e7f3ff;
    border-bottom: 1px solid #ddd;
    justify-content: space-between;
    align-items: center;
  }
  #replyBar.show { display: flex; }
  #replyBar button { border: none; background: none; font-size: 20px; cursor: pointer; }

  #chatContainer {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scroll-behavior: smooth;
  }
 .message {
    display: flex;
    padding: 4px 12px;
    transition: transform 0.2s;
    user-select: none;
    position: relative;
  }
 .message.me { justify-content: flex-end; }
 .message.other { justify-content: flex-start; }

 .bubble {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 18px;
    position: relative;
  }
 .me.bubble { background: #0084ff; color: white; }
 .other.bubble { background: #e4e6eb; color: black; }

 .replyPreview {
    border-left: 3px solid;
    padding-left: 8px;
    margin-bottom: 4px;
    font-size: 12px;
    opacity: 0.8;
  }
 .me.replyPreview { border-color: white; }
 .other.replyPreview { border-color: #0084ff; }

 .replyHint {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0;
    transition: opacity 0.2s;
    font-size: 14px;
  }

  #inputArea {
    display: flex;
    padding: 8px;
    background: white;
    border-top: 1px solid #ddd;
    gap: 8px;
  }
  #input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
  }
  #sendBtn {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #0084ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }
 .status { font-size: 10px; text-align: right; margin-top: 4px; }
</style>
</head>
<body>

<header>Fast Chat</header>

<div id="replyBar">
  <div>
    <div style="font-size:12px; color:#65676b">Replying to</div>
    <div id="replyText"></div>
  </div>
  <button onclick="cancelReply()">×</button>
</div>

<div id="chatContainer"></div>

<div id="inputArea">
  <input id="input" placeholder="Type a message... Drag right on a message to reply" />
  <button id="sendBtn">Send</button>
</div>

<script>
const chatContainer = document.getElementById('chatContainer');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const replyBar = document.getElementById('replyBar');
const replyText = document.getElementById('replyText');

let messages = [];
let replyTo = null;
let dragState = {}; // {id: {startX}}
const DRAG_THRESHOLD = 80;
const userId = "me";

// 1. LOAD MESSAGES FAST - from localStorage
function loadMessages() {
  const saved = localStorage.getItem('chat_messages');
  if (saved) {
    messages = JSON.parse(saved);
  } else {
    // Generate fake messages
    messages = Array.from({length: 100}, (_, i) => ({
      id: i,
      text: `This is message number ${i + 1}`,
      sender: i % 3 === 0? "me" : "other",
      timestamp: Date.now() - (100 - i) * 60000,
      replyTo: null
    }));
  }
  renderMessages();
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

// 2. RENDER MESSAGES
function renderMessages() {
  chatContainer.innerHTML = '';
  messages.forEach(msg => {
    const replyMsg = messages.find(m => m.id === msg.replyTo);
    const dragX = dragState[msg.id]? dragState[msg.id].currentX - dragState[msg.id].startX : 0;

    const div = document.createElement('div');
    div.className = `message ${msg.sender === userId? 'me' : 'other'}`;
    div.style.transform = `translateX(${Math.max(0, dragX)}px)`;
    div.dataset.id = msg.id;

    div.innerHTML = `
      <div class="replyHint">${dragX > 20? '↩️ Reply' : ''}</div>
      <div class="bubble">
        ${replyMsg? `<div class="replyPreview">Replying to: ${replyMsg.text.slice(0,40)}...</div>` : ''}
        <div>${msg.text}</div>
        <div class="status">${msg.status === 'sending'? '⏳' : '✓'}</div>
      </div>
    `;

    // Drag events
    div.addEventListener('mousedown', e => startDrag(e, msg.id));
    div.addEventListener('mousemove', e => moveDrag(e, msg.id));
    div.addEventListener('mouseup', e => endDrag(e, msg));
    div.addEventListener('mouseleave', e => endDrag(e, msg));

    div.addEventListener('touchstart', e => startDrag(e, msg.id));
    div.addEventListener('touchmove', e => moveDrag(e, msg.id));
    div.addEventListener('touchend', e => endDrag(e, msg));

    chatContainer.appendChild(div);
  });
}

// 3. DRAG TO REPLY
function getX(e) {
  return e.touches? e.touches[0].clientX : e.clientX;
}

function startDrag(e, id) {
  dragState[id] = { startX: getX(e), currentX: getX(e) };
}

function moveDrag(e, id) {
  if (!dragState[id]) return;
  dragState[id].currentX = getX(e);
  renderMessages();
}

function endDrag(e, msg) {
  if (!dragState[msg.id]) return;
  const diff = dragState[msg.id].currentX - dragState[msg.id].startX;
  if (diff > DRAG_THRESHOLD) {
    setReply(msg);
  }
  delete dragState[msg.id];
  renderMessages();
}

// 4. REPLY BAR
function setReply(msg) {
  replyTo = msg;
  replyText.textContent = msg.text.slice(0, 60) + '...';
  replyBar.classList.add('show');
}

function cancelReply() {
  replyTo = null;
  replyBar.classList.remove('show');
}

// 5. FAST SEND - Optimistic UI
function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  const newMsg = {
    id: Date.now(),
    text: text,
    sender: userId,
    timestamp: Date.now(),
    replyTo: replyTo? replyTo.id : null,
    status: 'sending'
  };

  // Show instantly
  messages.push(newMsg);
  localStorage.setItem('chat_messages', JSON.stringify(messages));
  renderMessages();
  chatContainer.scrollTop = chatContainer.scrollHeight;

  input.value = '';
  cancelReply();

  // Simulate server response
  setTimeout(() => {
    newMsg.status = 'sent';
    localStorage.setItem('chat_messages', JSON.stringify(messages));
    renderMessages();
  }, 300);
}

sendBtn.onclick = sendMessage;
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

// Init
loadMessages();
</script>
</body>
</html>
