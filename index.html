<!DOCTYPE html>
<html>
<head>
  <title>ChatBeat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family: 'Roboto', sans-serif; background: #0b141a; color: white; touch-action: pan-y; }
.topbar { background: linear-gradient(90deg, #00C896, #0077FF); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.topbar h2 { margin: 0; font-size: 20px; text-shadow: 0 0 5px #fff; cursor: pointer; }
.topbar div { display:flex; gap:8px }
.topbar button { background: rgba(0,0,0,0.3); width: auto; padding: 8px 12px; border-radius: 20px; font-weight: 500; border: none; color: white; cursor:pointer }
    #cover { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:20px; background: linear-gradient(135deg, #00C896 0%, #0077FF 50%, #000 100%); }
    #cover h1 { font-size: 3em; text-shadow: 0 0 20px #00C896; }
    input, button, textarea { padding:12px; margin:8px; border-radius:25px; border:none; width:80%; max-width:300px; font-size:16px; font-family: 'Roboto', sans-serif; }
    button { background: linear-gradient(90deg, #00C896, #0077FF); color:white; font-weight:700; cursor:pointer; }
.link-btn { background: transparent!important; text-decoration: underline; font-size: 14px; width: auto; background-image: none!important; }
    textarea { border-radius: 12px; height: 60px; background: #2a3942; color: white; width: 90%; }
    #app { display:none; }
.post-box { padding: 10px; background: #202c33; display:flex; gap:8px; align-items:center }
    #feed { padding: 10px; padding-bottom: 20px; }
.profile-box {background:#202c33; padding:15px; border-radius:12px; margin:10px; text-align:center; display:none}
.profile-box img{width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid #00C896}
.card { background: #202c33; padding:10px 12px 10px 12px; margin:10px 0; border-radius:12px; position: relative; max-width: 85%; }
.card.name { font-weight: 700; font-size: 13px; margin-bottom: 4px; display:flex; align-items:center; gap:8px; cursor:pointer }
.card-avatar {width:30px; height:30px; border-radius:50%; object-fit:cover; flex-shrink:0; display:block}
.card-post-img {width:100%; max-width:400px; border-radius:12px; margin-top:8px; cursor:pointer}
.card.del-btn { position: absolute; top: 8px; right: 8px; background: #FF6B6B; padding: 0; width: 20px; height: 20px; border-radius: 50%; font-size: 12px; line-height: 20px; text-align: center; cursor: pointer; border: none; color: white; z-index: 2; }
.chat-header { display: flex; align-items: center; padding: 10px; background: #202c33; border-bottom: 1px solid #2a3942; }
.chat-header h3 { margin: 0 auto; }
    #back-to-feed { background: transparent; width: auto; }

    /* REACTIONS */
   .reactions-row { display:flex; gap:8px; padding:8px 0; border-top:1px solid #2a3942; margin-top:8px }
   .react-btn { background:#2a3942; border:none; border-radius:20px; padding:4px 10px; color:white; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:4px }
   .react-btn.active { background:#0077FF }
   .react-summary { display:flex; gap:4px; margin-top:6px; font-size:12px; opacity:0.8 }
   .react-picker { display:none; position:absolute; bottom:100%; left:10px; background:#1f2c33; padding:6px; border-radius:30px; box-shadow:0 4px 10px rgba(0,0,0,0.5); gap:6px; z-index:5 }
   .react-picker.show { display:flex }
   .react-picker span { font-size:24px; cursor:pointer; transition:transform 0.1s }
   .react-picker span:hover { transform:scale(1.4) }

    /* COMMENTS */
   .comments-section { margin-top:8px; border-top:1px solid #2a3942; padding-top:8px; display:none }
   .comments-section.show { display:block }
   .comment { display:flex; gap:6px; margin:6px 0; font-size:14px }
   .comment-input-row { display:flex; gap:6px; margin-top:6px }
   .comment-input-row input { flex:1; background:#2a3942; color:white; border-radius:20px; padding:8px 12px }

    /* REPLY BAR */
    #reply-bar { display: none; padding: 8px 12px; background: #1f2c33; border-left: 4px solid #00C896; align-items: center; gap: 10px; }
    #reply-bar.show { display: flex; }
    #reply-content { flex: 1; overflow: hidden; }
    #reply-label { font-size: 12px; color: #00C896; font-weight: 700; }
    #reply-msg { font-size: 13px; color: #aebac1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #cancel-reply { background: transparent; width: auto; font-size: 22px; padding: 0 8px; }

    #global-chat { height: calc(100vh - 280px); overflow-y:auto; background:#0b141a; padding:10px; display: flex; flex-direction: column; gap: 2px; }
.bubble-wrapper { display: flex; transition: transform 0.15s ease-out; user-select: none; position:relative }
.me-wrapper { justify-content: flex-end; }
.other-wrapper { justify-content: flex-start; }
.bubble { max-width: 75%; padding: 6px 10px 8px 10px; border-radius: 8px; position: relative; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
.me-bubble { background: #0077FF; border-bottom-right-radius: 2px; }
.other-bubble { background: #005c4b; border-bottom-left-radius: 2px; }
.bubble-name { display: flex; align-items:center; gap:6px; font-size: 12px; font-weight: 700; margin-bottom: 3px; cursor:pointer }
.bubble-avatar {width:20px; height:20px; border-radius:50%; object-fit:cover; flex-shrink:0; display:block}
.bubble-text { display: block; }
.bubble-img {max-width:200px; border-radius:8px; margin-top:4px; cursor:pointer}
.bubble-del { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.4); padding: 0; width: 16px; height: 16px; border-radius: 50%; font-size: 10px; line-height: 16px; text-align: center; cursor: pointer; border: none; color: white; z-index: 2; }
.bubble audio { width: 220px; max-width: 100%; margin-top: 4px; }
.bubble-reactions { display:flex; gap:2px; margin-top:3px; font-size:12px }

/* REPLY QUOTE INSIDE BUBBLE */
.reply-quote { background: rgba(0,0,0,0.2); border-left: 3px solid #00C896; padding: 6px 8px; margin-bottom: 6px; border-radius: 4px; font-size: 13px; }
.reply-quote-name { font-weight: 700; color: #00C896; font-size: 12px; }
.reply-quote-text { color: #d1d7db; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.reply-hint { position: absolute; top: 50%; transform: translateY(-50%); font-size: 18px; opacity: 0; transition: opacity 0.1s; z-index: 1; }
.other-wrapper.reply-hint { left: -30px; }
.me-wrapper.reply-hint { right: -30px; }

.chat-input-area { display: flex; padding: 10px; background: #202c33; position: fixed; bottom: 0; left:0; width: 100%; z-index: 5; gap:5px }
.chat-input-area input { flex: 1; border-radius: 25px; background: #2a3942; color: white; }
.chat-input-area button { width: 50px; border-radius: 50%; }
.record-btn { background: red!important; animation: pulse 1s infinite }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(255,0,0,0.7)} 70%{box-shadow:0 0 0 10px rgba(255,0,0,0)} 100%{box-shadow:0 0 0 0 rgba(255,0,0,0)} }
.footer { text-align:center; padding:20px; font-size:12px; opacity:0.8; border-top:1px solid #2a3942; background: #111b21; padding-bottom: 80px; }
.footer a { color:#00C896; text-decoration:none; font-weight:700; }

.profile-popup { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index: 9999; }
.profile-popup.show { display:flex!important; }
.profile-popup img { max-width: 90%; max-height: 80%; border-radius: 15px; border: 3px solid #00C896; }
.profile-popup-close { position:absolute; top:20px; right:20px; font-size:40px; color:white; cursor:pointer }
  </style>
</head>
<body>

<div id="cover">
  <h1>ChatBeat</h1>
  <p><b>Connect in Color. Vibe in Sound.</b><br><br>
  Welcome to ChatBeat - the most fun way to connect! 🎉</p>
  <input id="name-input" placeholder="Choose your Name">
  <input id="email-input" placeholder="Email">
  <input id="pass-input" placeholder="Password" type="password">
  <button id="register-btn">Register</button>
  <button id="login-btn">Login</button>
  <button id="forgot-btn" class="link-btn">Forgot Password?</button>
  <p id="cover-error" style="color:#FF6B6B;"></p>
</div>

<div id="app">
  <div class="topbar">
    <button id="logout-btn">Logout</button>
    <h2 id="logo-btn">ChatBeat</h2>
    <div>
      <button id="profile-icon-btn">👤</button>
      <button id="chat-icon-btn">💬</button>
    </div>
  </div>

  <div id="profile-box" class="profile-box">
    <img id="profile-pic" src="https://ui-avatars.com/api/?name=U&background=00C896&color=fff">
    <h3 id="my-name"></h3>
    <input id="profile-upload" type="file" accept="image/*" style="display:none">
    <button onclick="document.getElementById('profile-upload').click()">Change Profile Photo</button>
    <button onclick="document.getElementById('profile-box').style.display='none'">Close</button>
  </div>

  <div id="feed-section">
    <div class="post-box">
      <textarea id="post-text" placeholder="What's on your mind?"></textarea>
      <button id="post-img-btn">📷</button>
      <input id="post-file" type="file" accept="image/*" style="display:none">
      <button id="post-btn">Post</button>
    </div>
    <div id="feed"></div>
  </div>

  <div id="chat-section" style="display:none;">
    <div class="chat-header">
      <button id="back-to-feed">← Back</button>
      <h3>Global Chat</h3>
    </div>

    <div id="reply-bar">
      <div id="reply-content">
        <div id="reply-label">Replying to</div>
        <div id="reply-msg"></div>
      </div>
      <button id="cancel-reply">×</button>
    </div>

    <div id="global-chat"></div>
    <div class="chat-input-area">
      <button id="chat-img-btn">📷</button>
      <input id="chat-file" type="file" accept="image/*" style="display:none">
      <input id="chat-input" placeholder="Type a message... Hold 2s to react">
      <button id="record-btn">🎤</button>
      <button id="send-chat">➤</button>
    </div>
  </div>

  <div class="footer">
    Website created by <a href="#">Kgothatso Swafo</a> from Limpopo, Burgersfort, Moroke. ✨<br>
    Version 2.1.0 - REACTIONS + COMMENTS + SHARE
  </div>
</div>

<div id="profile-popup" class="profile-popup">
  <span class="profile-popup-close" onclick="closeProfilePopup()">×</span>
  <img id="profile-popup-img" src="" onclick="event.stopPropagation()">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, deleteUser, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import { getDatabase, ref, set, get, query, orderByChild, equalTo, push, onChildAdded, remove, off, limitToLast, update } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD97-el91-ISWGkOhxWy4V_wXyOK6MJl0k",
  authDomain: "chatbeat-71f80.firebaseapp.com",
  databaseURL: "https://chatbeat-71f80-default-rtdb.firebaseio.com",
  projectId: "chatbeat-71f80",
  storageBucket: "chatbeat-71f80.firebasestorage.app",
  messagingSenderId: "38692820606",
  appId: "1:38692820606:web:edce5abf8d103e1f6e6a2f",
  measurementId: "G-KZ5KN31YFL"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const auth = getAuth(app);
const db = getDatabase(app);

const REACTIONS = ['👍','❤️','😂','😮','😢','😡'];
const DEFAULT_PIC = 'https://ui-avatars.com/api/?name=U&background=00C896&color=fff';
let currentUser = null;
let mediaRecorder;
let audioChunks = [];
let isRecording = false;
let loadedMessages = new Set();
let postImageData = null;
let chatImageData = null;
let userCache = {};
let allMessagesCache = {};
let replyToMsg = null;
let dragging = null;
let longPressTimer = null;
const DRAG_THRESHOLD = 70;
const LONG_PRESS = 400; // 0.4s to show reactions

window.openProfilePopup = (imgSrc) => {
  if(!imgSrc) return;
  document.getElementById('profile-popup-img').src = imgSrc;
  document.getElementById('profile-popup').classList.add('show');
}
window.closeProfilePopup = () => {
  document.getElementById('profile-popup').classList.remove('show');
}
document.getElementById('profile-popup').onclick = closeProfilePopup;

// REPLY FUNCTIONS
function setReply(msgData, msgKey){
  replyToMsg = {...msgData, key: msgKey };
  document.getElementById('reply-label').innerText = `Replying to ${msgData.name || 'User'}`;
  document.getElementById('reply-msg').innerText = msgData.text || 'Media';
  document.getElementById('reply-bar').classList.add('show');
}
function cancelReply(){
  replyToMsg = null;
  document.getElementById('reply-bar').classList.remove('show');
}
document.getElementById('cancel-reply').onclick = cancelReply;

// REACTION HELPERS
async function toggleReaction(path, emoji){
  const snap = await get(ref(db, path));
  const data = snap.val() || {};
  if(data[currentUser.uid] === emoji){
    await update(ref(db, path), {[currentUser.uid]: null});
  } else {
    await update(ref(db, path), {[currentUser.uid]: emoji});
  }
}
function renderReactions(container, reactions, onClick){
  container.innerHTML = '';
  const counts = {};
  Object.values(reactions||{}).forEach(r=>counts[r]=(counts[r]||0)+1);
  Object.entries(counts).forEach(([emoji, count])=>{
    const span = document.createElement('span');
    span.innerText = `${emoji} ${count}`;
    container.appendChild(span);
  });
}

// POST FUNCTIONS
document.getElementById('register-btn').onclick = async () => {
 const name = document.getElementById('name-input').value.trim();
 const email = document.getElementById('email-input').value.trim();
 const pass = document.getElementById('pass-input').value.trim();
 const err = document.getElementById('cover-error');
 err.innerText = '';
 if(name.length < 3) { err.innerText = "Name must be 3+ letters"; return; }
 try {
   const cred = await createUserWithEmailAndPassword(auth, email, pass);
   const nameSnap = await get(query(ref(db, 'users'), orderByChild('name'), equalTo(name)));
   if(nameSnap.exists()) { await deleteUser(cred.user); err.innerText = "Name already taken!"; return; }
   await set(ref(db, 'users/' + cred.user.uid), { name, email, color: '#00C896', profilePic: DEFAULT_PIC });
 } catch(e) { err.innerText = e.message; }
}

document.getElementById('login-btn').onclick = () => {
 const email = document.getElementById('email-input').value.trim();
 const pass = document.getElementById('pass-input').value.trim();
 signInWithEmailAndPassword(auth, email, pass).catch(e => { document.getElementById('cover-error').innerText = e.message; });
}

document.getElementById('logout-btn').onclick = () => { userCache = {}; allMessagesCache = {}; signOut(auth) }

onAuthStateChanged(auth, async (user) => {
 if(user) {
   currentUser = user;
   const userSnap = await get(ref(db, 'users/' + user.uid));
   let userData = userSnap.val();
   if(!userSnap.exists()){
     const nameFromEmail = user.email.split('@')[0];
     userData = { name: nameFromEmail, email: user.email, color: '#00C896', profilePic:DEFAULT_PIC };
     await set(ref(db, 'users/' + user.uid), userData);
   }
   document.getElementById('cover').style.display = 'none';
   document.getElementById('app').style.display = 'block';
   document.getElementById('my-name').innerText = userData.name;
   document.getElementById('profile-pic').src = userData.profilePic || DEFAULT_PIC;
   loadedMessages.clear(); allMessagesCache = {};
   document.getElementById('feed').innerHTML = ''; document.getElementById('global-chat').innerHTML = '';
   loadPosts(); loadChat();
 } else {
   document.getElementById('cover').style.display = 'flex';
   document.getElementById('app').style.display = 'none';
 }
});

document.getElementById('profile-upload').onchange = (e)=>{
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = ()=>{ set(ref(db,'users/'+currentUser.uid+'/profilePic'), reader.result); document.getElementById('profile-pic').src = reader.result; }
    reader.readAsDataURL(file);
  }
}

document.getElementById('post-img-btn').onclick = () => document.getElementById('post-file').click();
document.getElementById('post-file').onchange = (e)=>{
  const file = e.target.files[0];
  if(file){ const reader = new FileReader(); reader.onload = ()=>{ postImageData = reader.result; alert("Image ready!") }; reader.readAsDataURL(file); }
}

document.getElementById('post-btn').onclick = async () => {
  const text = document.getElementById('post-text').value.trim();
  if(!text &&!postImageData) return;
  await push(ref(db, 'posts'), { uid: currentUser.uid, text, image: postImageData, timestamp: Date.now(), reactions:{}, comments:{} });
  document.getElementById('post-text').value = ''; postImageData = null; document.getElementById('post-file').value = '';
}

async function getUser(uid){
  if(userCache[uid]) return userCache[uid];
  const userSnap = await get(ref(db, 'users/' + uid));
  const user = userSnap.exists()? userSnap.val() : {name: "Deleted User", color: "#888", profilePic:DEFAULT_PIC};
  userCache[uid] = user; return user;
}

function loadPosts() {
  off(ref(db, 'posts'));
  document.getElementById('feed').innerHTML = '';
  onChildAdded(query(ref(db, 'posts'), orderByChild('timestamp'), limitToLast(50)), async (snap) => {
    const post = snap.val(); const postKey = snap.key;
    const user = await getUser(post.uid); const userPic = user.profilePic || DEFAULT_PIC;
    const postDiv = document.createElement('div'); postDiv.className = 'card'; postDiv.id = 'post-' + postKey;

    let delBtn = post.uid === currentUser.uid? `<button class="del-btn" onclick="deletePost('${postKey}')">×</button>` : '';
    let imgHtml = post.image? `<img class="card-post-img" src="${post.image}" onclick="openProfilePopup('${post.image}')">` : '';

    postDiv.innerHTML = `
      ${delBtn}
      <div class="name" style="color:${user.color}"><img class="card-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</div>
      <div>${post.text||''}</div>${imgHtml}
      <div class="reactions-row">
        <button class="react-btn" id="react-${postKey}">👍 React</button>
        <button class="react-btn" onclick="toggleComments('${postKey}')">💬 Comment</button>
        <button class="react-btn" onclick="sharePost('${postKey}')">↗️ Share</button>
      </div>
      <div class="react-summary" id="react-sum-${postKey}"></div>
      <div class="react-picker" id="picker-${postKey}">
        ${REACTIONS.map(r=>`<span onclick="reactToPost('${postKey}','${r}')">${r}</span>`).join('')}
      </div>
      <div class="comments-section" id="comments-${postKey}">
        <div id="comment-list-${postKey}"></div>
        <div class="comment-input-row">
          <input id="comment-input-${postKey}" placeholder="Write a comment...">
          <button onclick="addComment('${postKey}')">Send</button>
        </div>
      </div>
    `;
    document.getElementById('feed').prepend(postDiv);
    renderReactions(document.getElementById(`react-sum-${postKey}`), post.reactions);
    loadComments(postKey);

    // long press for reactions
    const btn = document.getElementById(`react-${postKey}`);
    btn.onmousedown = btn.ontouchstart = () => longPressTimer = setTimeout(()=>document.getElementById(`picker-${postKey}`).classList.add('show'), LONG_PRESS);
    btn.onmouseup = btn.onmouseleave = btn.ontouchend = () => clearTimeout(longPressTimer);
    btn.onclick = () => toggleReaction(`posts/${postKey}/reactions`, '👍');
  });
}

window.reactToPost = async (key, emoji) => {
  await toggleReaction(`posts/${key}/reactions`, emoji);
  document.getElementById(`picker-${key}`).classList.remove('show');
  const snap = await get(ref(db, `posts/${key}/reactions`));
  renderReactions(document.getElementById(`react-sum-${key}`), snap.val());
}

window.toggleComments = (key) => document.getElementById(`comments-${key}`).classList.toggle('show');

window.addComment = async (key) => {
  const input = document.getElementById(`comment-input-${key}`);
  const text = input.value.trim(); if(!text) return;
  await push(ref(db, `posts/${key}/comments`), {uid: currentUser.uid, text, timestamp: Date.now()});
  input.value = '';
}

function loadComments(key){
  onChildAdded(ref(db, `posts/${key}/comments`), async (snap)=>{
    const c = snap.val(); const u = await getUser(c.uid);
    const div = document.createElement('div'); div.className='comment';
    div.innerHTML = `<b style="color:${u.color}">${u.name}</b>: ${c.text}`;
    document.getElementById(`comment-list-${key}`).appendChild(div);
  })
}

window.sharePost = (key) => {
  const url = `${window.location.href}#post-${key}`;
  navigator.clipboard.writeText(url);
  alert("Link copied! Share it anywhere.");
}

window.deletePost = async (key) => {
  if(confirm("Delete this post?")) { await remove(ref(db, 'posts/' + key)); document.getElementById('post-' + key).remove(); }
}

// CHAT FUNCTIONS
document.getElementById('chat-img-btn').onclick = () => document.getElementById('chat-file').click();
document.getElementById('chat-file').onchange = async (e)=>{
  const file = e.target.files[0];
  if(file){ const reader = new FileReader(); reader.onload = async ()=>{ chatImageData = reader.result; await push(ref(db, 'globalChat'), { uid: currentUser.uid, image: chatImageData, replyTo: replyToMsg?.key || null, reactions:{}, timestamp: Date.now() }); chatImageData = null; cancelReply(); }; reader.readAsDataURL(file); }
}

document.getElementById('send-chat').onclick = async () => {
  const text = document.getElementById('chat-input').value.trim();
  if(!text) return; document.getElementById('chat-input').value = '';
  await push(ref(db, 'globalChat'), { uid: currentUser.uid, text, replyTo: replyToMsg?.key || null, reactions:{}, timestamp: Date.now() });
  cancelReply();
}

function startDrag(e, msgKey){ dragging = { id: msgKey, startX: e.touches?e.touches[0].clientX:e.clientX, x: 0 }; }
function moveDrag(e){ if(!dragging) return; dragging.x = (e.touches?e.touches[0].clientX:e.clientX) - dragging.startX; if(dragging.x < 0) dragging.x = 0; const el = document.getElementById('wrapper-' + dragging.id); if(el) el.style.transform = `translateX(${dragging.x}px)`; if(dragging.x > 20) e.preventDefault(); }
function endDrag(e, msgData, msgKey){ if(!dragging) return; if(dragging.x > DRAG_THRESHOLD){ setReply(msgData, msgKey); } const el = document.getElementById('wrapper-' + dragging.id); if(el) el.style.transform = 'translateX(0)'; dragging = null; }

function loadChat() {
  off(ref(db, 'globalChat'));
  document.getElementById('global-chat').innerHTML = '<p style="text-align:center; opacity:0.6">Loading messages...</p>';
  loadedMessages.clear();
  get(query(ref(db, 'globalChat'), orderByChild('timestamp'), limitToLast(50))).then(async (snapshot) => {
    document.getElementById('global-chat').innerHTML = '';
    const promises = []; snapshot.forEach((snap) => { promises.push(renderMessage(snap, false)); })
    await Promise.all(promises);
    document.getElementById('global-chat').scrollTop = document.getElementById('global-chat').scrollHeight;
    onChildAdded(query(ref(db, 'globalChat'), orderByChild('timestamp'), limitToLast(1)), (snap) => { if(!loadedMessages.has(snap.key)){ renderMessage(snap, true); } });
  });
}

async function renderMessage(snap, scroll){
  const msg = snap.val(); const msgKey = snap.key; if(loadedMessages.has(msgKey)) return;
  loadedMessages.add(msgKey); allMessagesCache[msgKey] = msg;
  const user = await getUser(msg.uid); const userPic = user.profilePic || DEFAULT_PIC; const isMe = msg.uid === currentUser.uid; msg.name = user.name;
  const wrapper = document.createElement('div'); wrapper.className = `bubble-wrapper ${isMe? 'me-wrapper' : 'other-wrapper'}`; wrapper.id = 'wrapper-' + msgKey;
  let delBtn = isMe? `<button class="bubble-del" onclick="deleteMsg('${msgKey}')">×</button>` : '';
  let replyHtml = msg.replyTo && allMessagesCache[msg.replyTo]? `<div class="reply-quote"><div class="reply-quote-name">${(await getUser(allMessagesCache[msg.replyTo].uid)).name}</div><div class="reply-quote-text">${allMessagesCache[msg.replyTo].text || 'Media'}</div></div>` : '';
  let content = msg.image? `${replyHtml}<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<img class="bubble-img" src="${msg.image}" onclick="openProfilePopup('${msg.image}')">` : msg.audio? `${replyHtml}<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<audio controls src="${msg.audio}"></audio>` : `${replyHtml}<span class="bubble-name"><img class="bubble-avatar" src="${userPic}" onclick="openProfilePopup('${userPic}')">${user.name}</span>${delBtn}<span class="bubble-text">${msg.text}</span>`;

  wrapper.innerHTML = `<div class="reply-hint">↩️</div><div class="bubble ${isMe? 'me-bubble' : 'other-bubble'}" id="bubble-${msgKey}">${content}<div class="bubble-reactions" id="msg-react-${msgKey}"></div><div class="react-picker" id="msg-picker-${msgKey}">${REACTIONS.map(r=>`<span onclick="reactToMsg('${msgKey}','${r}')">${r}</span>`).join('')}</div></div>`;

  // long press for message reactions
  const bubble = wrapper.querySelector('.bubble');
  bubble.onmousedown = bubble.ontouchstart = () => longPressTimer = setTimeout(()=>document.getElementById(`msg-picker-${msgKey}`).classList.add('show'), LONG_PRESS);
  bubble.onmouseup = bubble.onmouseleave = bubble.ontouchend = () => clearTimeout(longPressTimer);

  // drag for reply
  wrapper.addEventListener('touchstart', e => startDrag(e, msgKey), {passive: true});
  wrapper.addEventListener('touchmove', e => moveDrag(e), {passive: false});
  wrapper.addEventListener('touchend', e => endDrag(e, msg, msgKey));
  wrapper.addEventListener('mousedown', e => startDrag(e, msgKey));
  wrapper.addEventListener('mousemove', e => moveDrag(e));
  wrapper.addEventListener('mouseup', e => endDrag(e, msg, msgKey));
  wrapper.addEventListener('mouseleave', e => endDrag(e, msg, msgKey));

  document.getElementById('global-chat').appendChild(wrapper);
  renderReactions(document.getElementById(`msg-react-${msgKey}`), msg.reactions);
  if(scroll) document.getElementById('global-chat').scrollTop = document.getElementById('global-chat').scrollHeight;
}

window.reactToMsg = async (key, emoji) => {
  await toggleReaction(`globalChat/${key}/reactions`, emoji);
  document.getElementById(`msg-picker-${key}`).classList.remove('show');
  const snap = await get(ref(db, `globalChat/${key}/reactions`));
  renderReactions(document.getElementById(`msg-react-${key}`), snap.val());
}

window.deleteMsg = async (key) => {
  if(confirm("Delete this message?")) { await remove(ref(db, 'globalChat/' + key)); document.getElementById('wrapper-' + key).remove(); loadedMessages.delete(key); delete allMessagesCache[key]; }
}

document.getElementById('chat-icon-btn').onclick = () => { document.getElementById('feed-section').style.display = 'none'; document.getElementById('chat-section').style.display = 'block'; document.getElementById('profile-box').style.display = 'none'; }
document.getElementById('back-to-feed').onclick = () => { document.getElementById('feed-section').style.display = 'block'; document.getElementById('chat-section').style.display = 'none'; document.getElementById('profile-box').style.display = 'none'; }
document.getElementById('logo-btn').onclick = () => { document.getElementById('feed-section').style.display = 'block'; document.getElementById('chat-section').style.display = 'none'; document.getElementById('profile-box').style.display = 'none'; }
</script>
</body>
